# ExternalSecret: slack-secret in ns argo-events
#
# Materializes the k8s Secret `slack-secret` that the Slack EventSource consumes (token +
# signingSecret). Values come from the externally-managed AWS Secrets Manager secret
# `slack-creds` — a single consolidated JSON blob of all Slack-app credentials:
#     {
#       "verification_token": "<Verification Token>",  # legacy token Argo Events validates against
#       "signing_secret":     "<Signing Secret>",      # HMAC request signature
#       "bot_oauth_token":    "xoxb-…",                 # bot token for the reply path (later)
#       "client_id": "…", "client_secret": "…"          # OAuth app creds (future)
#     }
# (verification_token + signing_secret come from Slack -> Basic Information -> App Credentials.)
# We rename them on the way into the k8s Secret so the EventSource keeps its expected keys:
#   secretKey token         <- SM property verification_token  (NOT the bot xoxb- token)
#   secretKey signingSecret <- SM property signing_secret
#   secretKey botToken      <- SM property bot_oauth_token      (reply path: conversations.replies /
#                                                                chat.postMessage; unused by the EventSource)
#
# `slack-creds` is read-referenced, NOT auto-generated (the values originate in Slack), so it
# MUST pre-exist in Secrets Manager AND be listed in `secrets_registries` (cli/infra/vars.nu)
# or the module's EXACT-ARN read policy denies it and ESO returns
# "could not get secret data from provider".
#
# ClusterSecretStore `git-creds-secretstore` is framework-constant (provisioned by the CLI's
# external-secrets bootstrap). Explicit spec.data (not dataFrom) maps the SM JSON properties to
# the secret keys the EventSource references.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: slack-secret
  namespace: argo-events
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: git-creds-secretstore
    kind: ClusterSecretStore
  target:
    name: slack-secret
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: token
      remoteRef:
        key: slack-creds
        property: verification_token
    - secretKey: signingSecret
      remoteRef:
        key: slack-creds
        property: signing_secret
    - secretKey: botToken
      remoteRef:
        key: slack-creds
        property: bot_oauth_token
