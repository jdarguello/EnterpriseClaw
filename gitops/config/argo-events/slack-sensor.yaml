# Slack Sensor — turns an inbound Slack `app_mention` into one short-lived Argo Workflow.
#
# This is the first link of the ArgoCon "Golden Path via chat" spine (CLAUDE.md §2.2):
#     Slack EventSource (/slack) → NATS EventBus → THIS Sensor → Argo Workflow (one run per message)
#
# SCHEMA (verified live 2026-06-30 by replaying a signed synthetic app_mention through the source).
# The Argo Events Slack source dispatches `json.Marshal(&eventsAPIEvent.InnerEvent)` DIRECTLY as the
# event Data — there is NO `body`/`header` wrapper (unlike the github webhook source). Trigger params
# and filters are resolved with gjson against that payload, whose exact shape is:
#     {
#       "type": "app_mention",                 # InnerEvent.Type  → filter on this
#       "Data": {                              # capital-D: slack-go InnerEvent.Data (no json tag)
#         "type": "app_mention",
#         "user":      "U…",                   # who mentioned the bot  → Step 0 identity (X-Slack-User-Id)
#         "text":      "<@U0BOT> …",           # the order text         → fed to the agent
#         "ts":        "1719…",                # message ts             → reply thread root if thread_ts==""
#         "thread_ts": "",                     # set when mentioned inside a thread (else empty)
#         "channel":   "C…",                   # where to reply
#         "event_ts":  "1719…"
#       }
#     }
#
# RBAC: the Sensor runs as ns-default SA, which clusterrolebinding.yaml binds to ClusterRole
# `admin`, so it may create Workflows in ns `argo` (same path the github-push sensor uses).
#
# WORKFLOW DAG — triage-first branching (Task C, 2026-07-01):
#
#   main (DAG)
#   ├── log           busybox audit echo (always; independent)
#   ├── triage        rebuilds Slack thread transcript → A2A → general-classifier → {"category":"read-only"|"action",...}
#   ├── read          when category==read-only  → thread transcript → A2A → github-reader → reply
#   ├── resolve       when category==action     → broker /identity/resolve → {has_token, token}
#   ├── login         when resolve.has_token==false → broker /auth/login/start → reply login URL
#   └── act           when resolve.has_token==true  → thread transcript → A2A via agentgateway (Bearer JWT) → reply
#
# MULTI-TURN CONTEXT: triage, read, and act steps each call `enterpriseclaw slack thread` to rebuild
# the full Slack thread as a conversation transcript (User:/Assistant: lines) BEFORE calling the agent.
# This ensures a follow-up reply ("the owner is jdarguello") carries its prior turns as context rather
# than being classified/answered in isolation. Falls back to the single message if the fetch fails.
#
# Exit handler `error-reply` fires when workflow.status != Succeeded so a crash never silently hangs
# the user (Argo Workflow `onExit`).
#
# INJECTION SAFETY: user-controlled text (workflow.parameters.text) is NEVER interpolated into a
# command/args string. It is always passed as an env var value and read inside the step as $env.*
# (nushell). The `command: [nu, -c]` override is used for all enterpriseclaw steps so nushell
# receives the script as a single safe string argument.
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: slack-mention
  namespace: argo-events
spec:
  template:
    serviceAccountName: default
  dependencies:
    # eventName `chat` = the key under `spec.slack:` in slack-event-source.yaml (the webhook name).
    - name: slack-event
      eventSourceName: slack
      eventName: chat
      # Defense-in-depth: the app is subscribed to only app_mention today, but pin the trigger to
      # app_mention so adding more bot events later can't accidentally fire this workflow.
      filters:
        data:
          - path: type
            type: string
            value:
              - app_mention
  triggers:
    - template:
        name: slack-mention-workflow
        k8s:
          operation: create
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: slack-mention-
                namespace: argo
              spec:
                serviceAccountName: pipe-storage
                entrypoint: main
                ttlStrategy:
                  secondsAfterCompletion: 600
                # Exit handler: if anything fails, post a generic sorry message into the thread.
                # Needs the channel/ts/thread_ts params so they are declared at workflow scope.
                onExit: error-reply
                # These five fields are exactly what the downstream steps consume:
                #   user           → Workflow Step 0 (Session-Broker /identity/resolve, X-Slack-User-Id)
                #   text           → the order, forwarded to the agent (A2A message/send)
                #   channel/ts/thread_ts → where + which thread to post the reply back into
                arguments:
                  parameters:
                    - name: text
                    - name: user
                    - name: channel
                    - name: ts
                    - name: thread_ts
                templates:

                  # ── MAIN DAG ─────────────────────────────────────────────────────────────
                  - name: main
                    dag:
                      tasks:
                        # Audit echo — independent; a log failure must never block the reply.
                        - name: log
                          template: echo-event

                        # Step 1: triage — A2A DIRECT to general-classifier.
                        # Output parameter `category` drives all downstream branching.
                        - name: triage
                          template: triage-step

                        # Branch A: read-only intent — no auth needed.
                        - name: read
                          template: read-step
                          dependencies: [triage]
                          when: "'{{tasks.triage.outputs.parameters.category}}' == 'read-only'"

                        # Branch B: action intent — first resolve identity.
                        - name: resolve
                          template: resolve-step
                          dependencies: [triage]
                          when: "'{{tasks.triage.outputs.parameters.category}}' == 'action'"

                        # Branch B1: no cached token → send login URL.
                        - name: login
                          template: login-step
                          dependencies: [resolve]
                          when: "'{{tasks.resolve.outputs.parameters.has_token}}' == 'false'"

                        # Branch B2: token present → call platform-agent via agentgateway.
                        - name: act
                          template: act-step
                          arguments:
                            parameters:
                              - name: token
                                value: "{{tasks.resolve.outputs.parameters.token}}"
                          dependencies: [resolve]
                          when: "'{{tasks.resolve.outputs.parameters.has_token}}' == 'true'"

                  # ── TEMPLATE: echo-event (audit/debug) ───────────────────────────────────
                  - name: echo-event
                    container:
                      # public.ecr.aws → no Docker Hub pull-rate limit on EKS nodes.
                      image: public.ecr.aws/docker/library/busybox:1.36
                      command: [sh, -c]
                      args:
                        - |
                          echo "Slack app_mention received:"
                          echo "  user:      $SLACK_USER"
                          echo "  channel:   $SLACK_CHANNEL"
                          echo "  ts:        $SLACK_TS"
                          echo "  thread_ts: $SLACK_THREAD_TS"
                          echo "  text:      [REDACTED — see INJECTION SAFETY note]"
                      env:
                        - name: SLACK_USER
                          value: "{{workflow.parameters.user}}"
                        - name: SLACK_CHANNEL
                          value: "{{workflow.parameters.channel}}"
                        - name: SLACK_TS
                          value: "{{workflow.parameters.ts}}"
                        - name: SLACK_THREAD_TS
                          value: "{{workflow.parameters.thread_ts}}"
                        # USER_TEXT is available as env but NOT echoed to logs (injection safety).
                        - name: USER_TEXT
                          value: "{{workflow.parameters.text}}"

                  # ── TEMPLATE: triage-step ─────────────────────────────────────────────────
                  # Calls general-classifier (toolless; no MCP permissions; SPIFFE-only).
                  # Returns outputs.parameters.category = "read-only" | "action".
                  # Default on ANY failure → "action" (safe: routes to auth, never serves anon).
                  - name: triage-step
                    # The classifier is a kagent/ADK agent that INTERMITTENTLY returns an empty A2A
                    # task in state "input-required" (no extractable text) instead of "completed" —
                    # a transient ADK turn-completion quirk (observed ~1 in N; usually completes fine).
                    # That empty turn makes `enterpriseclaw a2a call` exit non-zero (outside the parse
                    # try/catch) and fail the node → all branches omitted → onExit error-reply. Retrying
                    # the step re-sends message/send and almost always gets a clean "completed" verdict.
                    retryStrategy:
                      limit: "3"
                      retryPolicy: "Always"
                      backoff:
                        duration: "2s"
                        factor: "2"
                    outputs:
                      parameters:
                        - name: category
                          valueFrom:
                            path: /tmp/category.txt
                    container:
                      # Private ECR; nodes pull via IAM (same pattern as git-clone.yaml).
                      image: 158623290227.dkr.ecr.us-east-1.amazonaws.com/credicorp-enterpriseclaw/enterpriseclaw:v0.1.1
                      # Nushell multi-word commands invoked WITHOUT `main` prefix.
                      # USER_TEXT is read via $env.USER_TEXT — NEVER interpolated into the script.
                      command: [nu, -c]
                      args:
                        - |
                          # Rebuild the whole Slack thread so a follow-up reply carries its prior turns as
                          # context (the pipeline is one workflow per message → otherwise the agent sees only
                          # the latest line). Fall back to the single message if the thread fetch fails
                          # (e.g. the bot lacks the channels:history scope) so single-turn never regresses.
                          let convo = (
                            try {
                              enterpriseclaw slack thread --channel $env.SLACK_CHANNEL --ts $env.SLACK_TS --thread-ts $env.SLACK_THREAD_TS --token $env.SLACK_BOT_TOKEN --out /tmp/thread.txt
                              let t = (open /tmp/thread.txt | str trim)
                              if ($t | is-empty) { $env.USER_TEXT } else { $t }
                            } catch { $env.USER_TEXT }
                          )
                          enterpriseclaw a2a call --url $env.CLASSIFIER_URL --message $convo --out /tmp/a2a.json
                          # The classifier is prompted to emit BARE single-line JSON, but Haiku
                          # intermittently wraps it in a ```json ... ``` markdown fence (and could add
                          # stray prose). `from json` throws on the fence, which would default us to
                          # "action" and wrongly wall a greeting behind login. Extract the first {...}
                          # object first so parsing is robust to fences/prose; fail-closed to "action".
                          let category = (
                            try {
                              let raw = (open /tmp/a2a.json | get text)
                              let json_str = ($raw | str replace --all --regex '(?s)^[^{]*(\{.*\})[^}]*$' '$1')
                              $json_str | from json | get category | str downcase | str trim
                            } catch {
                              "action"
                            }
                          )
                          # Validate that we got a known category; default to "action" otherwise.
                          let safe_category = (
                            if ($category == "read-only" or $category == "action") {
                              $category
                            } else {
                              "action"
                            }
                          )
                          $safe_category | save --force /tmp/category.txt
                      env:
                        - name: CLASSIFIER_URL
                          value: "http://general-classifier.kagent:8080"
                        # INJECTION SAFETY: user text and transcript arrive only as env values / files.
                        - name: USER_TEXT
                          value: "{{workflow.parameters.text}}"
                        - name: SLACK_CHANNEL
                          value: "{{workflow.parameters.channel}}"
                        - name: SLACK_TS
                          value: "{{workflow.parameters.ts}}"
                        - name: SLACK_THREAD_TS
                          value: "{{workflow.parameters.thread_ts}}"
                        - name: SLACK_BOT_TOKEN
                          valueFrom:
                            secretKeyRef:
                              name: slack-bot
                              key: botToken

                  # ── TEMPLATE: read-step ───────────────────────────────────────────────────
                  # category==read-only: A2A DIRECT to github-reader (workload rail, no JWT).
                  # Replies the agent's answer into the Slack thread.
                  - name: read-step
                    # github-reader is also a kagent/ADK agent → same intermittent empty
                    # "input-required" flakiness as triage. Reads are idempotent, so retry is safe.
                    # (act-step is intentionally NOT retried — it mutates/opens PRs, so a retry after a
                    # partial success could double-act; that path is left to fail-closed to error-reply.)
                    retryStrategy:
                      limit: "3"
                      retryPolicy: "Always"
                      backoff:
                        duration: "2s"
                        factor: "2"
                    container:
                      image: 158623290227.dkr.ecr.us-east-1.amazonaws.com/credicorp-enterpriseclaw/enterpriseclaw:v0.1.1
                      command: [nu, -c]
                      args:
                        - |
                          # Rebuild the whole Slack thread so a follow-up reply carries its prior turns as
                          # context (the pipeline is one workflow per message → otherwise the agent sees only
                          # the latest line). Fall back to the single message if the thread fetch fails
                          # (e.g. the bot lacks the channels:history scope) so single-turn never regresses.
                          let convo = (
                            try {
                              enterpriseclaw slack thread --channel $env.SLACK_CHANNEL --ts $env.SLACK_TS --thread-ts $env.SLACK_THREAD_TS --token $env.SLACK_BOT_TOKEN --out /tmp/thread.txt
                              let t = (open /tmp/thread.txt | str trim)
                              if ($t | is-empty) { $env.USER_TEXT } else { $t }
                            } catch { $env.USER_TEXT }
                          )
                          # Call github-reader; captures answer into /tmp/read.json.
                          enterpriseclaw a2a call --url $env.READER_URL --message $convo --out /tmp/read.json
                          let answer = (
                            try {
                              open /tmp/read.json | get text
                            } catch {
                              "I looked into it but could not format the answer. Please try again."
                            }
                          )
                          # Post answer back to the Slack thread.
                          enterpriseclaw slack reply --channel $env.SLACK_CHANNEL --text $answer --ts $env.SLACK_TS --thread-ts $env.SLACK_THREAD_TS --token $env.SLACK_BOT_TOKEN
                      env:
                        - name: READER_URL
                          value: "http://github-reader.kagent:8080"
                        - name: USER_TEXT
                          value: "{{workflow.parameters.text}}"
                        - name: SLACK_CHANNEL
                          value: "{{workflow.parameters.channel}}"
                        - name: SLACK_TS
                          value: "{{workflow.parameters.ts}}"
                        - name: SLACK_THREAD_TS
                          value: "{{workflow.parameters.thread_ts}}"
                        - name: SLACK_BOT_TOKEN
                          valueFrom:
                            secretKeyRef:
                              name: slack-bot
                              key: botToken

                  # ── TEMPLATE: resolve-step ────────────────────────────────────────────────
                  # category==action: call Session-Broker /identity/resolve.
                  # Exits ZERO even when has_token=false; branch on the VALUE, not step success.
                  # Writes has_token and token to separate files for output parameters.
                  # Token is kept in a file, never logged (injection + secret safety).
                  - name: resolve-step
                    outputs:
                      parameters:
                        - name: has_token
                          valueFrom:
                            path: /tmp/has_token.txt
                        - name: token
                          valueFrom:
                            path: /tmp/token.txt
                    container:
                      image: 158623290227.dkr.ecr.us-east-1.amazonaws.com/credicorp-enterpriseclaw/enterpriseclaw:v0.1.1
                      command: [nu, -c]
                      args:
                        - |
                          # broker resolve exits ZERO even when has_token=false — branch on value.
                          enterpriseclaw broker resolve --url $env.BROKER_URL --slack-user-id $env.SLACK_USER --out /tmp/id.json
                          let result = (open /tmp/id.json)
                          let has_token = ($result | get has_token | into string | str downcase)
                          let token = (
                            try { $result | get token } catch { "" }
                          )
                          $has_token | save --force /tmp/has_token.txt
                          # Token written to file only; never echoed to stdout/logs.
                          $token | save --force /tmp/token.txt
                      env:
                        - name: BROKER_URL
                          value: "http://session-broker.session-broker.svc.cluster.local"
                        - name: SLACK_USER
                          value: "{{workflow.parameters.user}}"

                  # ── TEMPLATE: login-step ──────────────────────────────────────────────────
                  # has_token==false: request a login URL and post it to Slack.
                  # Privileged action requires Keycloak auth → broker /auth/login/start.
                  - name: login-step
                    container:
                      image: 158623290227.dkr.ecr.us-east-1.amazonaws.com/credicorp-enterpriseclaw/enterpriseclaw:v0.1.1
                      command: [nu, -c]
                      args:
                        - |
                          enterpriseclaw broker login-start --url $env.BROKER_URL --slack-user-id $env.SLACK_USER --out /tmp/login.json
                          let login_url = (open /tmp/login.json | get login_url)
                          let reply_text = $"To perform this action I need to verify your identity. Please sign in: ($login_url)"
                          enterpriseclaw slack reply --channel $env.SLACK_CHANNEL --text $reply_text --ts $env.SLACK_TS --thread-ts $env.SLACK_THREAD_TS --token $env.SLACK_BOT_TOKEN
                      env:
                        - name: BROKER_URL
                          value: "http://session-broker.session-broker.svc.cluster.local"
                        - name: SLACK_USER
                          value: "{{workflow.parameters.user}}"
                        - name: SLACK_CHANNEL
                          value: "{{workflow.parameters.channel}}"
                        - name: SLACK_TS
                          value: "{{workflow.parameters.ts}}"
                        - name: SLACK_THREAD_TS
                          value: "{{workflow.parameters.thread_ts}}"
                        - name: SLACK_BOT_TOKEN
                          valueFrom:
                            secretKeyRef:
                              name: slack-bot
                              key: botToken

                  # ── TEMPLATE: act-step ────────────────────────────────────────────────────
                  # has_token==true: A2A VIA agentgateway to platform-agent (Bearer = user JWT).
                  # Token arrives via inputs.parameters.token (from resolve outputs.parameters.token).
                  # NOTE: platform-agent is currently NOT Ready (mcp-discovery-token Secret missing).
                  # This branch goes live once that Secret is provisioned (separate task).
                  - name: act-step
                    inputs:
                      parameters:
                        - name: token
                    container:
                      image: 158623290227.dkr.ecr.us-east-1.amazonaws.com/credicorp-enterpriseclaw/enterpriseclaw:v0.1.1
                      command: [nu, -c]
                      args:
                        - |
                          # Rebuild the whole Slack thread so a follow-up reply carries its prior turns as
                          # context (the pipeline is one workflow per message → otherwise the agent sees only
                          # the latest line). Fall back to the single message if the thread fetch fails
                          # (e.g. the bot lacks the channels:history scope) so single-turn never regresses.
                          let convo = (
                            try {
                              enterpriseclaw slack thread --channel $env.SLACK_CHANNEL --ts $env.SLACK_TS --thread-ts $env.SLACK_THREAD_TS --token $env.SLACK_BOT_TOKEN --out /tmp/thread.txt
                              let t = (open /tmp/thread.txt | str trim)
                              if ($t | is-empty) { $env.USER_TEXT } else { $t }
                            } catch { $env.USER_TEXT }
                          )
                          # A2A call to platform-agent via agentgateway (JWT on the wire).
                          # exitcode != 0 → agentgateway rejected the token (401/403/5xx/transport).
                          enterpriseclaw a2a call --url $env.ACTION_URL --message $convo --token $env.USER_JWT --out /tmp/act.json
                          let answer = (
                            try {
                              open /tmp/act.json | get text
                            } catch {
                              "The agent completed the task but I could not parse its response."
                            }
                          )
                          enterpriseclaw slack reply --channel $env.SLACK_CHANNEL --text $answer --ts $env.SLACK_TS --thread-ts $env.SLACK_THREAD_TS --token $env.SLACK_BOT_TOKEN
                      env:
                        - name: ACTION_URL
                          value: "http://agentic-a2a-gw.kagent:8080/platform-agent"
                        - name: USER_TEXT
                          value: "{{workflow.parameters.text}}"
                        # Token from resolve output — kept in env, never echoed or logged.
                        - name: USER_JWT
                          value: "{{inputs.parameters.token}}"
                        - name: SLACK_CHANNEL
                          value: "{{workflow.parameters.channel}}"
                        - name: SLACK_TS
                          value: "{{workflow.parameters.ts}}"
                        - name: SLACK_THREAD_TS
                          value: "{{workflow.parameters.thread_ts}}"
                        - name: SLACK_BOT_TOKEN
                          valueFrom:
                            secretKeyRef:
                              name: slack-bot
                              key: botToken

                  # ── TEMPLATE: error-reply (onExit handler) ────────────────────────────────
                  # Fires when workflow.status != Succeeded (any unhandled failure).
                  # Posts a generic apology into the Slack thread so the user is never left hanging.
                  # Uses inline Python (same pattern as the original reply step) so this handler has
                  # no dependency on the enterpriseclaw image being pullable (image-pull failure
                  # is itself a common crash reason; a second image pull for the exit handler would
                  # be equally likely to fail). busybox curl is not reliable for JSON+auth; Python
                  # slim is the safe universal fallback here.
                  - name: error-reply
                    container:
                      image: public.ecr.aws/docker/library/python:3.12-slim
                      command: [python3, -c]
                      args:
                        - |
                          import json, os, urllib.request
                          # Only post if the workflow actually failed — onExit fires for all exits.
                          status = os.environ.get("WORKFLOW_STATUS", "")
                          if status == "Succeeded":
                              print("Workflow succeeded; skipping error-reply.")
                              raise SystemExit(0)
                          token = os.environ["SLACK_BOT_TOKEN"]
                          channel = os.environ.get("SLACK_CHANNEL", "")
                          ts = os.environ.get("SLACK_TS", "")
                          thread = os.environ.get("SLACK_THREAD_TS", "") or ts
                          reply = (
                              ":warning: Something went wrong while processing your request. "
                              "Please try again or contact your platform team."
                          )
                          body = {"channel": channel, "text": reply}
                          if thread:
                              body["thread_ts"] = thread
                          req = urllib.request.Request(
                              "https://slack.com/api/chat.postMessage",
                              data=json.dumps(body).encode(),
                              headers={
                                  "Authorization": "Bearer " + token,
                                  "Content-Type": "application/json; charset=utf-8",
                              },
                              method="POST",
                          )
                          with urllib.request.urlopen(req, timeout=15) as r:
                              resp = json.load(r)
                          print("error-reply ok=%s error=%s" % (resp.get("ok"), resp.get("error")))
                      env:
                        - name: WORKFLOW_STATUS
                          value: "{{workflow.status}}"
                        - name: SLACK_BOT_TOKEN
                          valueFrom:
                            secretKeyRef:
                              name: slack-bot
                              key: botToken
                        - name: SLACK_CHANNEL
                          value: "{{workflow.parameters.channel}}"
                        - name: SLACK_TS
                          value: "{{workflow.parameters.ts}}"
                        - name: SLACK_THREAD_TS
                          value: "{{workflow.parameters.thread_ts}}"

          # gjson paths into the dispatched inner event (NO `body` wrapper for the Slack source).
          # thread_ts carries a `value:` default so an empty/absent thread (top-level mention) can't
          # fail param resolution and wedge the trigger.
          parameters:
            - src:
                dependencyName: slack-event
                dataKey: Data.text
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: slack-event
                dataKey: Data.user
              dest: spec.arguments.parameters.1.value
            - src:
                dependencyName: slack-event
                dataKey: Data.channel
              dest: spec.arguments.parameters.2.value
            - src:
                dependencyName: slack-event
                dataKey: Data.ts
              dest: spec.arguments.parameters.3.value
            - src:
                dependencyName: slack-event
                dataKey: Data.thread_ts
                value: ""
              dest: spec.arguments.parameters.4.value
