# ExternalSecret: slack-bot in ns argo
#
# The Slack reply step runs inside the per-message Argo Workflow (ns `argo`), but the bot token
# lives in the consolidated SM secret `slack-creds` (property `bot_oauth_token`). k8s Secrets are
# namespace-scoped, so the workflow can't read `slack-secret` from ns `argo-events`; this materializes
# the bot token into ns `argo` as Secret `slack-bot` (key `botToken`), mounted by the reply step.
#
# Same ClusterSecretStore (`git-creds-secretstore`) + same source property as `slack-secret/botToken`
# in argo-events, so both replies (future) and the EventSource read ONE source of truth.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: slack-bot
  namespace: argo
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: git-creds-secretstore
    kind: ClusterSecretStore
  target:
    name: slack-bot
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: botToken
      remoteRef:
        key: slack-creds
        property: bot_oauth_token
