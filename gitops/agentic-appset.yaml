# ApplicationSet for the agentic stack — the real agents/MCPs (kagent CRs), distinct from the
# kagent-trio Helm INSTALL (gitops/helm/agents/*, driven by the `agents` ApplicationSet).
#
# Mirrors the project's git-directory-generator pattern: it discovers every directory under
# gitops/agentic/* and creates one Argo CD Application per directory, each rendered from the PUBLIC
# repo. Add a new component directory under gitops/agentic/ and it is onboarded automatically.
#
# Generates: agentic-llm-gateway (the agentgateway->Bedrock proxy), agentic-agents (the kagent
# Agent + ModelConfig CRs), agentic-mcps (tool servers), agentic-mcp-gateway (agentgateway routes).
#
# All CRs land in the `kagent` namespace (the kagent controller's WATCH_NAMESPACES).
#
# Wave 2: agentic CRs require kagent-trio controllers (agents AppSet, wave 1) to be Healthy
# and the ESO ClusterSecretStore (helm AppSet, wave 0) to be Ready before ExternalSecrets
# in agentic-mcps can resolve. Applied as a sync-wave on the AppSet object itself so that
# the parent app-of-apps waits for waves 0 and 1 to complete first.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: agentic
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  generators:
    - git:
        repoURL: https://github.com/jdarguello/EnterpriseClaw
        revision: main
        directories:
          - path: gitops/agentic/*
  template:
    metadata:
      name: "agentic-{{path.basename}}"
      labels:
        app.kubernetes.io/part-of: agentic
    spec:
      project: default
      source:
        repoURL: https://github.com/jdarguello/EnterpriseClaw
        targetRevision: main
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: kagent
      # ESO 0.10.5's GithubAccessToken v1alpha1 CRD schema does NOT include `repositories`
      # or `permissions`, so both fields are SILENTLY PRUNED on admission (see
      # gitops/agentic/mcps/generator-github-app-token.yaml header). The live object can
      # therefore never match git and agentic-mcps sits permanently OutOfSync/Healthy — a
      # cosmetic diff, not a failure (the token still mints; MCPServers stay Healthy).
      # Ignore just those two paths so the app reports Synced; the fields stay in git so the
      # narrowing activates automatically once ESO is upgraded to a CRD that supports them.
      # Scoped by kind — GithubAccessToken only exists in agentic-mcps, so the other three
      # generated apps (agents, mcp-gateway, llm-gateway) are unaffected.
      ignoreDifferences:
        - group: generators.external-secrets.io
          kind: GithubAccessToken
          jsonPointers:
            - /spec/repositories
            - /spec/permissions
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
