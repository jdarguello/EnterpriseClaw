# Dummy API key for the fake-LLM ModelConfig. The fake-LLM ignores it; kagent's OpenAI client just
# wants a non-empty key to initialize. NOT a real credential.
apiVersion: v1
kind: Secret
metadata:
  name: dryrun-llm-key
  namespace: kagent
type: Opaque
stringData:
  OPENAI_API_KEY: "sk-dryrun-not-a-real-key"
