# Registers echo-MCP DIRECTLY (iteration 1 — no agentgateway in the path yet). Streamable-HTTP is
# the kagent default transport. In iteration 2 this url repoints through the agentgateway waypoint.
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: echo-mcp
  namespace: kagent
spec:
  description: "Echo MCP (dry-run) — returns the HTTP headers it received, to probe JWT propagation."
  protocol: STREAMABLE_HTTP
  url: http://echo-mcp.kagent.svc.cluster.local:8080/mcp
  timeout: 30s
