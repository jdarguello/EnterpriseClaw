# Iteration-2 stage B: agentgateway VALIDATES the user JWT (enterpriseclaw realm) and CLAIM-GATES
# access on the mcp-user realm role.
#
# 1.3.1 findings that shaped this (see jwt-propagation.md):
#  - backend.mcp.authentication is UNUSABLE: CRD exposes only a remote jwks backendRef, but the
#    runtime NACKs demanding jwks_inline. So JWT validation must live in traffic.jwtAuthentication.
#  - backend.mcp.authorization does NOT see jwt.* when validation is at traffic level (it filtered
#    echo even for a user WITH the role). So authorization is kept at the SAME (traffic) level as
#    validation, where jwt.* is in scope. For a single-tool MCP this route-gate is equivalent to a
#    tool-gate; tool-name granularity (mcp.tool.name) is a refinement to revisit on a newer release.
#  - mode: Strict is REQUIRED: only Strict populates jwt.* into the authorization CEL context (and
#    rejects tokenless=401 / forged=401). Permissive lets tokenless through but leaves jwt.* EMPTY,
#    so the authz CEL then denies even a VALID token; Optional also 401s tokenless MCP requests.
#    Caveat: Strict 401s the kagent controller's tokenless tool DISCOVERY — so end-to-end through
#    kagent needs a discovery token on RemoteMCPServer.headersFrom (open item). This direct-to-gateway
#    config is the proven enforcement; PASSED 2026-06-25: alice(mcp-user)->echo; bob/no-token/forged->denied.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: echo-mcp-jwt
  namespace: kagent
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: echo-mcp-route
  traffic:
    jwtAuthentication:
      mode: Strict
      providers:
        - issuer: "http://keycloak.keycloak.svc/realms/enterpriseclaw"
          audiences: ["enterpriseclaw-agents"]
          jwks:
            remote:
              backendRef:
                group: ""
                kind: Service
                name: keycloak
                namespace: keycloak
                port: 80
              jwksPath: /realms/enterpriseclaw/protocol/openid-connect/certs
    authorization:
      action: Allow            # allow requests matching an expression; deny all others
      policy:
        matchExpressions:
          # gate access on the mcp-user realm role carried in the validated JWT (nested claim)
          - '"mcp-user" in jwt.realm_access.roles'
