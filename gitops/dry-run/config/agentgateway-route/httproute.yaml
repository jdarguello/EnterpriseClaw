# Routes /mcp on the agw-dryrun proxy to the echo-MCP AgentgatewayBackend. This is the standard
# Gateway-API HTTPRoute, but the backendRef points at an agentgateway.dev/AgentgatewayBackend
# (not a Service) so agentgateway applies its MCP handling + attached policy.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-mcp-route
  namespace: kagent
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: agw-dryrun
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: echo-mcp-backend
