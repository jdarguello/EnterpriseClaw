apiVersion: v1
kind: ConfigMap
metadata:
  name: echo-mcp-server
  labels:
    app.kubernetes.io/part-of: kagent-jwt-dryrun
data:
  server.py: |
    #!/usr/bin/env python3
    """echo-MCP — a minimal Streamable-HTTP MCP server for the kagent JWT-propagation dry-run.

    It exposes ONE tool, `echo`, whose result is the set of HTTP request headers the server
    received on the tools/call POST. That is the probe: it reveals whether kagent forwarded the
    inbound user bearer (Authorization) to its MCP tool call. Stdlib only, no external deps.

    Transport: MCP "Streamable HTTP" (the kagent RemoteMCPServer default, STREAMABLE_HTTP).
    Single endpoint accepts JSON-RPC over POST and answers with application/json (spec-allowed;
    we never need server->client streaming). GET returns 405 (no server-initiated SSE stream).
    Sessionless: we do not issue an Mcp-Session-Id (clients tolerate its absence).
    """
    import json, os
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    PORT = int(os.environ.get("PORT", "8080"))
    PROTO_DEFAULT = "2025-06-18"

    ECHO_TOOL = {
        "name": "echo",
        "description": "Returns the HTTP headers the MCP server received (JWT-propagation probe).",
        "inputSchema": {
            "type": "object",
            "properties": {"message": {"type": "string", "description": "ignored by the probe"}},
        },
    }


    def _headers_text(headers):
        return "\n".join(sorted("%s: %s" % (k, v) for k, v in headers.items()))


    class H(BaseHTTPRequestHandler):
        def log_message(self, fmt, *args):
            # Record method/path + whether an Authorization header arrived — visible in pod logs.
            print("%s %s authorization_present=%s" % (self.command, self.path, "authorization" in (k.lower() for k in self.headers.keys())))

        def _rpc(self, _id, result=None, error=None):
            msg = {"jsonrpc": "2.0", "id": _id}
            if error is not None:
                msg["error"] = error
            else:
                msg["result"] = result
            body = json.dumps(msg).encode()
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def _accepted(self):
            self.send_response(202)
            self.send_header("Content-Length", "0")
            self.end_headers()

        def do_GET(self):
            # No server->client SSE stream offered.
            self.send_response(405)
            self.send_header("Content-Length", "0")
            self.end_headers()

        def do_POST(self):
            length = int(self.headers.get("Content-Length", 0))
            raw = self.rfile.read(length) if length else b"{}"
            try:
                req = json.loads(raw or b"{}")
            except Exception:
                req = {}
            method = req.get("method")
            _id = req.get("id")

            # Notifications (no id, e.g. notifications/initialized) -> 202, no body.
            if _id is None and isinstance(method, str) and method.startswith("notifications/"):
                self._accepted()
                return

            if method == "initialize":
                proto = (req.get("params") or {}).get("protocolVersion") or PROTO_DEFAULT
                self._rpc(_id, {
                    "protocolVersion": proto,
                    "capabilities": {"tools": {"listChanged": False}},
                    "serverInfo": {"name": "echo-mcp", "version": "0.1.0"},
                })
            elif method == "tools/list":
                self._rpc(_id, {"tools": [ECHO_TOOL]})
            elif method == "tools/call":
                params = req.get("params") or {}
                if params.get("name") == "echo":
                    text = "=== headers echo-mcp received on tools/call ===\n" + _headers_text(self.headers)
                    self._rpc(_id, {"content": [{"type": "text", "text": text}], "isError": False})
                else:
                    self._rpc(_id, error={"code": -32602, "message": "unknown tool"})
            elif method == "ping":
                self._rpc(_id, {})
            else:
                self._rpc(_id, error={"code": -32601, "message": "method not found: %s" % method})


    if __name__ == "__main__":
        print("echo-mcp (streamable-http) listening on :%d" % PORT)
        ThreadingHTTPServer(("0.0.0.0", PORT), H).serve_forever()
