apiVersion: v1
kind: ConfigMap
metadata:
  name: fake-llm-server
  labels:
    app.kubernetes.io/part-of: kagent-jwt-dryrun
data:
  server.py: |
    #!/usr/bin/env python3
    """Fake OpenAI-compatible chat-completions server for the kagent JWT-propagation dry-run.

    This is NOT a model. Its only job is to make the agent's tool-calling DETERMINISTIC so the
    dry-run isolates the variable under test (does the user JWT propagate kagent -> MCP?) from
    the LLM hop (Bedrock/agentgateway-as-LLM-gateway, which is a separate dry-run item).

    Behaviour:
      * First turn (tools present, no prior tool result) -> return one tool_call for $TOOL_NAME.
      * After the tool result comes back (a message with role "tool") -> return a final answer.
      * Tolerant: handles both streaming (SSE) and non-streaming requests; if no tools are
        offered it just answers. Stdlib only, no external deps.
    """
    import json, os, time
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    TOOL_NAME = os.environ.get("TOOL_NAME", "echo")
    MODEL = os.environ.get("MODEL_NAME", "fake-gpt")
    PORT = int(os.environ.get("PORT", "8080"))


    def _has_tool_result(messages):
        return any(m.get("role") == "tool" for m in messages)


    def _tool_call_message():
        return {
            "role": "assistant",
            "content": None,
            "tool_calls": [{
                "id": "call_echo_1",
                "type": "function",
                "function": {
                    "name": TOOL_NAME,
                    "arguments": json.dumps({"message": "dry-run propagation probe"}),
                },
            }],
        }


    def _final_message():
        return {"role": "assistant",
                "content": "Echo tool invoked. Inspect the tool result for the headers the MCP server received."}


    class H(BaseHTTPRequestHandler):
        def log_message(self, fmt, *args):
            # keep logs quiet but record method+path for debugging the dry-run
            print("%s - %s" % (self.command, self.path))

        def _send_json(self, code, payload):
            body = json.dumps(payload).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self):
            path = self.path.split("?", 1)[0].rstrip("/")
            if path == "/v1/models":
                self._send_json(200, {"object": "list",
                                      "data": [{"id": MODEL, "object": "model", "owned_by": "dry-run"}]})
            elif path in ("", "/health", "/healthz"):
                self._send_json(200, {"status": "ok"})
            else:
                self._send_json(404, {"error": "not found"})

        def do_POST(self):
            length = int(self.headers.get("Content-Length", 0))
            raw = self.rfile.read(length) if length else b"{}"
            try:
                req = json.loads(raw or b"{}")
            except Exception:
                req = {}
            messages = req.get("messages", []) or []
            tools = req.get("tools", []) or []
            stream = bool(req.get("stream", False))

            if tools and not _has_tool_result(messages):
                msg, finish = _tool_call_message(), "tool_calls"
            else:
                msg, finish = _final_message(), "stop"

            created = int(time.time())
            cid = "chatcmpl-dryrun"

            if stream:
                self.send_response(200)
                self.send_header("Content-Type", "text/event-stream")
                self.send_header("Cache-Control", "no-cache")
                self.end_headers()

                def chunk(delta, fin=None):
                    d = {"id": cid, "object": "chat.completion.chunk", "created": created,
                         "model": MODEL,
                         "choices": [{"index": 0, "delta": delta, "finish_reason": fin}]}
                    self.wfile.write(b"data: " + json.dumps(d).encode() + b"\n\n")
                    self.wfile.flush()

                if finish == "tool_calls":
                    tc = msg["tool_calls"][0]
                    chunk({"role": "assistant"})
                    chunk({"tool_calls": [{"index": 0, "id": tc["id"], "type": "function",
                                           "function": {"name": tc["function"]["name"],
                                                        "arguments": tc["function"]["arguments"]}}]})
                    chunk({}, "tool_calls")
                else:
                    chunk({"role": "assistant", "content": msg["content"]})
                    chunk({}, "stop")
                self.wfile.write(b"data: [DONE]\n\n")
                self.wfile.flush()
            else:
                self._send_json(200, {
                    "id": cid, "object": "chat.completion", "created": created, "model": MODEL,
                    "choices": [{"index": 0, "message": msg, "finish_reason": finish}],
                    "usage": {"prompt_tokens": 0, "completion_tokens": 0, "total_tokens": 0},
                })


    if __name__ == "__main__":
        print("fake-llm listening on :%d (tool=%s model=%s)" % (PORT, TOOL_NAME, MODEL))
        ThreadingHTTPServer(("0.0.0.0", PORT), H).serve_forever()
