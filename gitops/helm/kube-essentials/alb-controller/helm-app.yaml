apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alb-controller
  namespace: argocd
spec:
  project: default
  sources:
    - chart: aws-load-balancer-controller
      repoURL: https://aws.github.io/eks-charts
      targetRevision: 3.3.0
      helm:
        releaseName: aws-load-balancer-controller
        valueFiles:
          - $values/gitops/helm/kube-essentials/alb-controller/values.yaml
    - repoURL: https://github.com/jdarguello/EnterpriseClaw
      targetRevision: main
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: alb-controller
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true