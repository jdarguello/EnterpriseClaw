apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alb-controller
  namespace: argocd
  annotations:
    # Wave 0 within helm-kube-essentials. The ALB controller registers a mutating webhook
    # (mservice.elbv2.k8s.aws) with failurePolicy=Fail. It MUST be Healthy before ANY
    # Application that creates Services is synced, or those Service creates are rejected.
    # Sits in wave 0 (after external-secrets at wave -1) so it is fully up before
    # the configs AppSet (top-level wave 1) begins syncing Service-creating apps.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - chart: aws-load-balancer-controller
      repoURL: https://aws.github.io/eks-charts
      targetRevision: 3.3.0
      helm:
        releaseName: aws-load-balancer-controller
        valueFiles:
          - $values/gitops/helm/kube-essentials/alb-controller/values.yaml
    - repoURL: https://github.com/jdarguello/EnterpriseClaw
      targetRevision: main
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: alb-controller
  # The chart renders a fresh self-signed webhook cert (genSignedCert) on every
  # render, and the controller manages its live serving cert itself — desired and
  # live can never agree. Without these ignores, selfHeal keeps re-syncing and
  # stomps the live cert, opening x509 windows that reject every Service/Ingress
  # apply cluster-wide (the init "webhook race").
  ignoreDifferences:
    - kind: Secret
      name: aws-load-balancer-tls
      namespace: alb-controller
      jsonPointers:
        - /data
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      name: aws-load-balancer-webhook
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: aws-load-balancer-webhook
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
