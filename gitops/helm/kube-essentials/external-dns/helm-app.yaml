apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
spec:
  project: default
  sources:
    - chart: external-dns
      repoURL: https://kubernetes-sigs.github.io/external-dns/
      targetRevision: 1.21.1
      helm:
        releaseName: external-dns
        valueFiles:
          - $values/gitops/helm/kube-essentials/external-dns/values.yaml
    - repoURL: https://github.com/jdarguello/EnterpriseClaw
      targetRevision: main
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true