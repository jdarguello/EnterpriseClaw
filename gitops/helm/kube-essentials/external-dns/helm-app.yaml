apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  annotations:
    # Wave 0 within helm-kube-essentials: parallel with alb-controller.
    # external-dns has no webhook and does not block other apps — placed at wave 0
    # so it is available before the configs AppSet (top-level wave 1) creates Ingresses
    # that need DNS records.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - chart: external-dns
      repoURL: https://kubernetes-sigs.github.io/external-dns/
      targetRevision: 1.21.1
      helm:
        releaseName: external-dns
        valueFiles:
          - $values/gitops/helm/kube-essentials/external-dns/values.yaml
    - repoURL: https://github.com/jdarguello/EnterpriseClaw
      targetRevision: main
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
