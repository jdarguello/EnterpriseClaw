apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    # Wave -1 within helm-kube-essentials: ESO operator must be Healthy before the
    # ClusterSecretStore (wave 0) and ExternalSecret (wave 1) in the same Application
    # can be successfully reconciled. This closes the ESO→CSS→ES ordering fragility
    # documented in CLAUDE.md §6.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  sources:
    - chart: external-secrets
      repoURL: https://charts.external-secrets.io
      targetRevision: 0.10.5
      helm:
        releaseName: external-secrets
        valueFiles:
          - $values/gitops/helm/kube-essentials/external-secrets/values.yaml
    - repoURL: https://github.com/jdarguello/EnterpriseClaw
      targetRevision: main
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
