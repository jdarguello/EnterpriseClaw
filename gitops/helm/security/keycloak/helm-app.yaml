apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
spec:
  project: default
  sources:
    - chart: argo-events
      repoURL: https://argoproj.github.io/argo-helm
      targetRevision: 2.4.21
      helm:
        releaseName: argo-events
        valueFiles:
          - $values/gitops/helm/argo/events/values.yaml
    - repoURL: https://github.com/jdarguello/EnterpriseClaw
      targetRevision: main
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argo-events
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true