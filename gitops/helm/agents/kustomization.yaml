# Group aggregator for the kagent-trio Helm installs (the prod app-of-apps path).
# The dry-run installs these via gitops/dry-run/agents-appset.yaml (a directory generator that
# globs the leaf dirs directly), so this file is only the prod group-level aggregator.
# CRDs (sync-wave 0) listed before controllers (sync-wave 1) for readability.
resources:
# --- Infrastructure prereqs (sync-wave -1) ---
- gateway-api-crds/         # gateway.networking.k8s.io CRDs — required by agentgateway and all Gateway/HTTPRoute CRs
                             # Previously assumed "Istio supplies these in prod" (CLAUDE.md §5); now explicitly managed.
# --- CRDs (sync-wave 0) ---
- kagent-crds/
- kmcp-crds/
- agentgateway-crds/        # agentgateway.dev CRDs only (NOT gateway.networking.k8s.io — see gateway-api-crds above)
# --- controllers (sync-wave 1) ---
- kagent/
- kmcp/
- agentgateway/            # agentgateway control plane, deployed in ns agentgateway-system, Istio-mesh-integrated.
# agentgateway is a Gateway-API control plane (controller + xDS) that provisions L7 proxies from Gateway CRs.
# Project decision: it runs as the Istio ambient L7 waypoint (values.yaml sets istio.autoEnabled: true) —
# Istio stays the cluster's sole ingress gateway + mesh control plane; gateway-api-crds (wave -1) owns the CRDs.
