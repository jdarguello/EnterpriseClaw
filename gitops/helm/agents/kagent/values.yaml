# Trimmed kagent values for a small / dry-run cluster.
# Keys verified against helm/kagent/values.yaml @ v0.9.9 (2026-06-24).
# Rationale + footprint notes: .claude/skills/kagent-trio/reference/install.md
#
# Helm silently ignores unknown values keys, so a mistyped disable-key leaves that
# component ON. Re-verify these names against the pinned chart before trusting them.

database:
  postgres:
    bundled:
      enabled: true           # REQUIRED: the kagent controller has NO DB-less mode — `helm template`
                              # FAILS without a database (controller-deployment.yaml:94). To drop this
                              # pod you must instead supply an external database.postgres.url / urlFile;
                              # there is no SQLite/file option. Binds a PVC on local-path (default SC).
      resources:
        requests: { cpu: 100m, memory: 256Mi }
        limits:   { cpu: 500m, memory: 512Mi }

ui:
  replicas: 1                 # kagent dashboard (Next.js); ClusterIP :8080; image from cr.kagent.dev.
  resources:                  # bound it for the small node (chart default limit is 1Gi)
    requests: { cpu: 50m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 640Mi }

kmcp:
  enabled: false              # installed as its OWN Helm app (gitops/helm/agents/kmcp) so there is
                              # exactly one kmcp controller. Disabling the bundled subchart here.

kagent-tools:
  enabled: false              # built-in tool server; off unless an agent uses it
grafana-mcp: { enabled: false }
querydoc:    { enabled: false }   # also wants an OpenAI key

controller:
  replicas: 1
  watchNamespaces: ["kagent"] # scope the watch (less work + smaller blast radius); CRs must live here
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 1,   memory: 512Mi }
  auth:
    mode: unsecure        # UI/controller REST is open — no oauth2-proxy is deployed ("No SSO on the
                          # demo UIs", §2.2). NOTE: trusted-proxy is NOT required for JWT->MCP
                          # propagation — the bearer reaches MCP via the Agent CR's allowedHeaders +
                          # agentgateway's default MCP passthrough, independent of AUTH_MODE.
                          # trusted-proxy only gates inbound user-id attribution AND requires an
                          # oauth2-proxy in front, or the UI 401s on every /api/* call. Flip back to
                          # trusted-proxy only together with real UI SSO (oauth2-proxy + Keycloak client).
    userIdClaim: sub      # JWT claim used as the kagent user id (only consulted in trusted-proxy mode)

rbac:
  namespaces: ["kagent"]      # namespaced Role/RoleBinding instead of a cluster-scoped ClusterRole

# All 10 bundled sample agents OFF (each ~128Mi → ~1.3Gi if left on). Exact keys, verbatim:
k8s-agent:            { enabled: false }
kgateway-agent:       { enabled: false }
istio-agent:          { enabled: false }
promql-agent:         { enabled: false }
observability-agent:  { enabled: false }
argo-rollouts-agent:  { enabled: false }
helm-agent:           { enabled: false }
cilium-policy-agent:  { enabled: false }
cilium-manager-agent: { enabled: false }
cilium-debug-agent:   { enabled: false }
