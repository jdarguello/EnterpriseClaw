apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kmcp-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"   # CRDs first — provides the MCPServer CRD (kagent-crds does NOT)
spec:
  project: default
  source:
    chart: kmcp-crds
    repoURL: ghcr.io/kagent-dev/kmcp/helm   # OCI Helm chart (Helm-format source: no oci:// prefix)
    targetRevision: 0.3.0                    # kmcp is versioned independently of kagent (0.9.9)
    helm:
      releaseName: kmcp-crds
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # CRDs are large; avoid the last-applied-config annotation size limit
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
