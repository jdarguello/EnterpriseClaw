apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kmcp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"   # controller after CRDs (wave 0)
spec:
  project: default
  sources:
    - chart: kmcp
      repoURL: ghcr.io/kagent-dev/kmcp/helm   # OCI Helm chart; controller for the MCPServer CRD
      targetRevision: 0.3.0
      helm:
        releaseName: kmcp
        valueFiles:
          - $values/gitops/helm/agents/kmcp/values.yaml
    - repoURL: https://github.com/jdarguello/EnterpriseClaw
      targetRevision: main
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
