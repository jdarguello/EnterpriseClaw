apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
  annotations:
    # Wave 0 within helm-argo: parallel with argo-events. Same reasoning — the
    # argo-workflows controller itself does not require Services through the ALB webhook;
    # config-argo-workflows (top-level wave 1) handles its ExternalSecret/ConfigMap
    # overlays after ESO is healthy.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - chart: argo-workflows
      repoURL: https://argoproj.github.io/argo-helm
      targetRevision: 1.0.14
      helm:
        releaseName: argo-workflows
        valueFiles:
          - $values/gitops/helm/argo/workflows/values.yaml
    - repoURL: https://github.com/jdarguello/EnterpriseClaw
      targetRevision: main
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
