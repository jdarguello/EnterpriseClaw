# ============================================================================================
# A2A INGRESS AUTH POLICY — the front door for platform-agent.
# ============================================================================================
# This policy validates the Keycloak user JWT at the A2A ingress (the Workflow → platform-agent
# hop). It is the UNPROVEN hop of the EnterpriseClaw demo (the mcp-gateway policies.yaml covers
# the already-proven Workflow→agentgateway→MCP path; this covers the Workflow→agentgateway→A2A
# path where the A2A hop has not yet been exercised with real JWT validation).
#
# == TWO LEVELS OF 403 (by design) ============================================================
# 1. THIS POLICY (A2A ingress) — bad/expired/forged/absent token → 401/403 from agentgateway
#    BEFORE the request reaches platform-agent at all. The Workflow catches this and posts
#    "please re-login" (or "your session expired") back to Slack.
# 2. mcp-gateway/policies.yaml (MCP hop) — valid token but insufficient capability scope →
#    403 from the MCP-gateway waypoint INSIDE platform-agent's tool call. The agent catches
#    the 403 response from the MCP and reports it cleanly ("you are not authorized for that
#    action — a more privileged role is required") per the platform-agent systemMessage.
# The model is NOT in either of these authorization loops — the mesh decides.
#
# == AUDIENCE (unpinned at the A2A door — FIX 2026-07-01) =====================================
# §2.2 imagined a "single broad audience" (`enterpriseclaw-agents`) at the A2A ingress, and the
# dry-run's `dryrun-cli` client had an audience mapper producing it. BUT the PROD realm's real
# login path uses the `session-broker` client, which has NO such mapper — a user token's only
# audiences are the resource clients it holds roles on (issue-tracker, infra-provisioner), added
# by the `roles` scope's `oidc-audience-resolve-mapper`. So pinning `enterpriseclaw-agents` here
# 401'd every real token (InvalidAudience). We UNPIN the audience at this front door (unset = any
# audience allowed) and rely on `has(jwt.sub)` to admit any valid user; the meaningful per-MCP
# audience+claim gating is downstream at mcp-gateway. HARDENING: add an `enterpriseclaw-agents`
# audience mapper to the realm (Session-Broker) and re-pin it here.
#
# == AUTHORIZATION (admission-level only) =====================================================
# The A2A ingress job is: reject bad/expired/forged/absent tokens (401/403), admit ANY valid
# authenticated user. Per-capability gating is DOWNSTREAM at mcp-gateway. So the authorization
# expression here must accept any token that passed validation — i.e. any token with a `sub`
# claim (which all valid JWTs carry, including Keycloak's). We do NOT re-implement the per-MCP
# scope check here.
#
# `has(jwt.sub)` is the minimal guard: `Strict` mode alone would 401 tokenless/forged, but the
# `authorization` block must also be present (Strict populates `jwt.*` but does not itself gate
# on claims — you need both blocks at `traffic` level per crds.md gotcha #2). The expression
# `has(jwt.sub)` matches ANY valid validated token (every Keycloak access token has a `sub`).
#
# Alternatively, gate on the realm-level `agent-user` role that all users who should reach the
# platform-agent hold in Keycloak (`'"agent-user" in jwt.realm_access.roles'`). That is slightly
# tighter and matches the demo narrative (alice/juan both hold `agent-user`; an entirely foreign
# identity that somehow got a valid token would be blocked). Either is correct for the POC.
# `has(jwt.sub)` is chosen here as the safest fallback if realm roles haven't been minted yet
# in the test environment, with a comment showing the role-gate variant.
#
# == PASSTHROUGH = ON (critical — differs from mcp-gateway) ===================================
# mcp-gateway/policies.yaml leaves `backend.auth.passthrough` OFF because the user JWT stops at
# the MCP-gateway waypoint — GitHub-side auth is the MCP's own `github-creds` token, so the user
# JWT does NOT need to continue past the MCP gateway (two separate auth rails: user JWT gates
# access, bot token authenticates to GitHub).
#
# HERE, at the A2A INGRESS, the situation is different: platform-agent MUST receive the user
# bearer to propagate it onward via `allowedHeaders: ["Authorization"]` on its tool refs. Without
# the bearer, platform-agent cannot forward it to the mcp-gateway hop — and without it on the
# wire at the mcp-gateway, the user JWT claim-gating has nothing to validate, breaking the
# downstream authorization.
#
# Per crds.md gotcha #6 / jwt-propagation.md: "under active `jwtAuthentication` the validated
# bearer is CONSUMED at the gateway ... `backend.auth.passthrough` is the documented lever to
# re-forward it." The `passthrough` is on the AgentgatewayBackend (backend.yaml spec.policies.auth)
# not on this policy, but the reasoning belongs here for discoverability.
#
# == SHAPE (mirrors the proven mcp-gateway pattern exactly) ===================================
# Same proven pattern: jwtAuthentication + authorization both under `traffic`, attached to the
# HTTPRoute (NOT the Gateway — `jwt.*` must be in scope for the CEL, which requires route-level).
# issuer = the EXTERNAL Keycloak hostname `https://auth.enterprise-claw.io/realms/enterpriseclaw`.
# THIS IS THE FIX (2026-07-01): real login-wall user tokens are minted via the browser auth-code
# flow through the tenant host, so Keycloak (KC_HOSTNAME_URL pinned) stamps `iss` = the external
# URL. The dry-run used the in-cluster `http://keycloak.keycloak.svc/...` form because those test
# tokens were minted in-cluster; that value 401'd real user tokens with `Error(InvalidIssuer)`
# (jwt-propagation gotcha #4). The A2A route ONLY ever sees user tokens (external iss), so it uses
# the external issuer ALONE (unlike the MCP routes, which also see internal-iss discovery tokens
# and therefore list BOTH issuers — see mcp-gateway/policies.yaml).
# TENANT VALUE: `auth.enterprise-claw.io` is this tenant's domain — parameterize from `$domain_name`
# before the OSS release (the JWKS backendRef stays the in-cluster svc; only the `issuer` STRING is
# compared to the token's `iss`, so it can be external while keys are fetched in-cluster).
# ============================================================================================
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: platform-agent-jwt
  namespace: kagent
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: platform-agent-route
  traffic:
    jwtAuthentication:
      mode: Strict         # REQUIRED: Strict populates jwt.* for the CEL; Permissive does NOT
                           # (and 401s tokenless/forged — exactly what the A2A ingress needs).
      providers:
        - issuer: "https://auth.enterprise-claw.io/realms/enterpriseclaw"
          # audiences: OMITTED (unset = any audience allowed). Real login tokens (session-broker
          # client) carry no `enterpriseclaw-agents` aud — pinning it 401'd every token
          # (InvalidAudience). `has(jwt.sub)` below is the "any valid user" gate; per-MCP audience
          # gating is downstream at mcp-gateway. See the AUDIENCE note above.
          jwks:
            remote:
              backendRef:
                group: ""
                kind: Service
                name: keycloak
                namespace: keycloak
                port: 80
              jwksPath: /realms/enterpriseclaw/protocol/openid-connect/certs
    authorization:
      action: Allow        # admit requests matching the expression; deny (403) all others
      policy:
        matchExpressions:
          # Minimal admission gate: any valid validated token has a `sub`.
          # All Keycloak access tokens carry `sub` — so this admits every authenticated user
          # and denies only the corner case of a structurally valid JWT with no `sub` (unlikely).
          - 'has(jwt.sub)'
          #
          # Tighter alternative (recommended once the realm is stable):
          # Gate on the `agent-user` realm role that all human callers of platform-agent hold.
          # Alice and Juan both have this role; an unrecognized identity does not.
          # Uncomment when the Keycloak realm assigns `agent-user` to all platform-agent users:
          # - '"agent-user" in jwt.realm_access.roles'
