# ExternalSecret: github-readonly-creds in ns kagent
#
# Materializes the k8s Secret `github-readonly-creds` that the github-readonly MCPServer consumes
# via kmcp secretRefs → envFrom. The github-mcp-server reads GITHUB_PERSONAL_ACCESS_TOKEN from the
# injected env. github-readonly is launched with `--read-only` (zero write tools registered) so
# this token defines the anonymous blast radius — scope it to public/specific repos with read-only
# permissions.
#
# The SM secret `github-readonly-token` is a SEPARATE secret from `github-creds`. It carries a
# single JSON key `GH_TOKEN` with a dedicated read-scoped PAT. Keeping it separate from the
# read/write `github-creds` secret enforces least-privilege: even if the anonymous read path
# is compromised, the write token (github-creds) is never exposed to it.
#
# ClusterSecretStore `git-creds-secretstore` is framework-constant (provisioned by kube-essentials).
# An explicit `spec.data` mapping (not dataFrom) is used here because the SM secret key name
# (`GH_TOKEN`) differs from the env var the binary expects (`GITHUB_PERSONAL_ACCESS_TOKEN`).
#
# Sync-wave note: same as external-secret-github-creds.yaml — see that file's comment.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-readonly-creds
  namespace: kagent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: git-creds-secretstore
    kind: ClusterSecretStore
  target:
    name: github-readonly-creds
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: GITHUB_PERSONAL_ACCESS_TOKEN
      remoteRef:
        key: github-readonly-token
        property: GH_TOKEN
