# ExternalSecret: github-creds in ns kagent
#
# Materializes the k8s Secret `github-creds` that github-issues and infra-provisioning MCPServers
# consume via kmcp secretRefs → envFrom. The github-mcp-server reads GITHUB_PERSONAL_ACCESS_TOKEN
# from the injected env (PAT auth). The SM key `github-creds` must carry a
# `GITHUB_PERSONAL_ACCESS_TOKEN` field (add it to the existing SM secret alongside the GitHub-App
# keys that Argo Events / Workflows already use). All SM keys are materialized as-is via dataFrom
# extract — consistent with the argocd and argo-events ExternalSecrets in this repo.
#
# ClusterSecretStore `git-creds-secretstore` is framework-constant (provisioned by the CLI's
# kube-essentials Helm app, helm/kube-essentials/external-secrets/git-creds/). It is cluster-scoped
# so no per-namespace SecretStore is needed here.
#
# Sync-wave: this Secret must exist before the kagent MCPServer pods start, so it is placed at the
# same wave as the MCPServer CRs (wave 0 / default). If wave ordering is later added to this app,
# set this resource to a lower (earlier) wave than the MCPServer CRs that envFrom it.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-creds
  namespace: kagent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: git-creds-secretstore
    kind: ClusterSecretStore
  target:
    name: github-creds
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: github-creds
