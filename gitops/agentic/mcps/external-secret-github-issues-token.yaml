# ExternalSecret: github-issues-token in ns kagent
#
# Consumes the `github-app-token` GithubAccessToken generator (generator-github-app-token.yaml)
# and materializes the k8s Secret `github-issues-token` in ns kagent. The github-issues MCPServer
# envFrom's this secret (via kmcp secretRefs) to get `GITHUB_PERSONAL_ACCESS_TOKEN` — the env var
# that github-mcp-server reads for authentication.
#
# Why a separate secret from `github-creds`:
#   `github-creds` carries GitHub-App camelCase keys (githubAppID, githubAppPrivateKey, etc.)
#   that github-mcp-server does NOT recognise. This secret provides exactly one key
#   (`GITHUB_PERSONAL_ACCESS_TOKEN`) containing the short-lived installation token minted by
#   the generator. Both secrets are envFrom'd into the pod; github-mcp-server picks up the
#   recognised var and ignores the rest.
#
# refreshInterval must be < 60m (GitHub installation tokens expire at ~60m).
# 30m gives a comfortable refresh buffer.
#
# dataFrom + rewrite is used (ESO v0.9+ shape) instead of spec.data because the generator
# outputs a single key named `token`, which must be renamed to GITHUB_PERSONAL_ACCESS_TOKEN.
# ESO v0.10.5 (installed by the external-secrets helm-app) fully supports this shape.
#
# Sync-wave note: this ExternalSecret depends on `github-creds` (via the generator) existing
# first. ESO retries on failure, so hard wave-ordering is not strictly required, but if
# sync-waves are later added to this app, set this resource to a wave >= the
# external-secret-github-creds.yaml resource.
#
# ClusterSecretStore: NOT used here — this ExternalSecret sources from a generatorRef, not
# a SecretStore. The generator itself reads from the `github-creds` k8s Secret directly.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-issues-token
  namespace: kagent
spec:
  refreshInterval: "30m"
  target:
    name: github-issues-token
    creationPolicy: Owner
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: GithubAccessToken
          name: github-app-token
      rewrite:
        - regexp:
            source: "token"
            target: "GITHUB_PERSONAL_ACCESS_TOKEN"
