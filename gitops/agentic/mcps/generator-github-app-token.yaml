# GithubAccessToken generator: github-app-token in ns kagent
#
# Mints a short-lived GitHub App *installation token* (valid ~1h) and auto-refreshes it via
# External-Secrets Operator's GithubAccessToken generator. The consuming ExternalSecret
# (external-secret-github-issues-token.yaml) refreshes every 30m ‚Äî safely within the 1h window.
#
# Why a generator instead of a static PAT:
#   The `github-creds` SM secret carries GitHub-App credentials in camelCase
#   (githubAppID, githubAppPrivateKey, etc.) that github-mcp-server does NOT recognise ‚Äî it only
#   reads GITHUB_PERSONAL_ACCESS_TOKEN. The App private key never changes, but installation tokens
#   do expire, so they MUST be minted dynamically. ESO's GithubAccessToken generator is the
#   purpose-built solution: it calls the GitHub API to exchange the App private key for a fresh
#   installation token without ever storing it long-term.
#
# Chicken-and-egg avoidance:
#   The generator reads the private key from the k8s Secret `github-creds`, which is itself
#   materialized by `external-secret-github-creds.yaml` (a ClusterSecretStore‚ÜíSM extract).
#   The OUTPUT goes to a SEPARATE secret (`github-issues-token`) so there is no cycle.
#
# Least-privilege scope (INTENT ‚Äî see caveats below):
#   Pinned to repository `EnterpriseClaw-Sandbox` and permission `issues: write`
#   (write implies read ‚Äî covers list/search/read/create). No PR or repo-admin tools are
#   exposed through this token; those belong to the infra-provisioning MCP's scope.
#
#   ‚öÝ PREREQ ‚Äî the GitHub App itself must GRANT `issues: read & write`. The minted
#   installation token can only ever carry permissions the App was granted in its GitHub
#   App settings. App ID 3799768 (reused from the Argo create-github-app-token mint) was
#   originally granted only `contents` ‚Äî so issue calls 403 ("Resource not accessible by
#   integration") until an App admin adds Issues: Read & write in the App settings and the
#   installation accepts the updated permission. This is a GitHub-console action, not code.
#
#   ‚öÝ ESO 0.10.5 CAVEAT ‚Äî the `GithubAccessToken` v1alpha1 CRD at this version does NOT
#   include `permissions:` or `repositories:` in its schema, so the two fields below are
#   SILENTLY DROPPED on admission. The minted token therefore inherits the App installation's
#   FULL scope (all repos the install can see, all granted permissions), not the narrowing
#   declared here. Acceptable for the single-repo sandbox install; for least-privilege /
#   multi-tenant, upgrade ESO to a version whose GithubAccessToken CRD supports these fields
#   (verify against the ESO changelog) ‚Äî the fields are kept here so the narrowing activates
#   automatically once the CRD supports them.
#
# SANDBOX NOTE ‚Äî parameterize before OSS release:
#   `appID` and `installID` are inlined sandbox identifiers (not secrets, but env-specific).
#   Per the public/private repo split in CLAUDE.md ¬ß1.3, these values belong in the private
#   repo overlay (or CLI-generated patch) rather than in this public framework file. For now
#   they are inlined here for the ArgoCon sandbox; replace with Kustomize patches or a
#   CLI-generated ConfigMap/Secret injection before multi-tenant use.
#
# Refresh requirement:
#   The ESO GithubAccessToken spec mandates the consuming ExternalSecret's refreshInterval
#   be strictly less than 60 minutes (GitHub installation tokens expire at ~60m). The
#   ExternalSecret that consumes this generator uses `refreshInterval: "30m"`.
apiVersion: generators.external-secrets.io/v1alpha1
kind: GithubAccessToken
metadata:
  name: github-app-token
  namespace: kagent
spec:
  # Non-secret GitHub App identifiers ‚Äî inlined sandbox values; parameterize for OSS release.
  appID: "3799768"
  installID: "138693902"
  # Least-privilege intent: single repo, issues write (implies read) only.
  # NOTE: silently DROPPED by ESO 0.10.5's GithubAccessToken CRD (fields not in schema) ‚Äî
  # kept for when ESO is upgraded; today the token inherits the App install's full scope.
  # Also requires the App to be granted Issues:R/W in GitHub App settings (see header).
  repositories:
    - EnterpriseClaw-Sandbox
  permissions:
    issues: write
  auth:
    privateKey:
      secretRef:
        # `github-creds` is materialized by external-secret-github-creds.yaml from SM `github-creds`.
        # It must exist before this generator is reconciled; ESO retries automatically if it is
        # temporarily absent (e.g. initial sync ordering).
        name: github-creds
        key: githubAppPrivateKey
