# infra-provisioning — the PRIVILEGED-tier GitHub MCP (kmcp-managed).
#
# Same github-mcp-server runtime as github-issues, but TOOLSET-SCOPED to `repos,pull_requests` —
# the tools needed to open the Crossplane-Claim PR (create_branch / create_or_update_file /
# create_pull_request). Per §2.2 the agent does NOT provision directly: it proposes a PR; a human
# merges; Argo CD + Crossplane reconcile. So "provision a dev DB" == "open an infra PR" here.
#
# The agentgateway route in front requires the Keycloak capability `db:provision:dev` (client
# `infra-provisioner`) — held ONLY by /engineering/seniors (realm role senior-engineer). A baseline
# user (alice: agent-user, has only infra:read) is rejected at the gateway with 403 and never
# reaches this pod. See mcp-gateway/policies.yaml.
#
# Service `infra-provisioning:3000` serving `/mcp`. Same `github-creds` PREREQ as github-issues.
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: infra-provisioning
  namespace: kagent
spec:
  transportType: stdio
  stdioTransport: {}
  deployment:
    image: ghcr.io/github/github-mcp-server
    cmd: ./github-mcp-server
    args: ["stdio"]
    port: 3000
    env:
      GITHUB_TOOLSETS: "repos,pull_requests"
      # Same gh-token-proxy sidecar pattern as github-issues (mcps/proxy.py). NB: this MCP previously
      # envFrom'd only `github-creds`, which does NOT carry GITHUB_PERSONAL_ACCESS_TOKEN — so it never
      # had a usable token (it was never green). Routing through the sidecar gives it the same live
      # ESO-refreshed installation token. NOTE on subdomain-isolation: for the repos toolset,
      # get_file_contents in RAW mode targets raw.githubusercontent.com (a host proxy.py doesn't map);
      # the create_branch/create_or_update_file/create_pull_request PR path uses REST /api/v3 +
      # GraphQL, which the proxy handles.
      GITHUB_HOST: "http://localhost"
      GITHUB_PERSONAL_ACCESS_TOKEN: "unused-placeholder-replaced-by-gh-token-proxy"
    secretRefs:
      - name: github-creds        # -> envFrom; App camelCase keys (ignored); token now via sidecar
    sidecars:
      - name: gh-token-proxy
        image: public.ecr.aws/docker/library/python:3.12-slim
        command: ["python3", "-u", "/proxy/proxy.py"]
        securityContext:
          runAsUser: 0            # bind :80 (github-mcp-server drops the port -> always calls :80)
        volumeMounts:
          - name: proxy-script
            mountPath: /proxy
          - name: gh-token
            mountPath: /creds
            readOnly: true
        resources:
          requests:
            cpu: "10m"
            memory: "32Mi"
          limits:
            cpu: "100m"
            memory: "64Mi"
    volumes:
      - name: proxy-script
        configMap:
          name: gh-token-proxy
      - name: gh-token
        secret:
          secretName: github-issues-token   # shared: ESO token carries the App install's full scope
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
