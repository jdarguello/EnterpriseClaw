# github-issues — the BASELINE-tier GitHub MCP (kmcp-managed).
#
# Runs GitHub's official github-mcp-server (stdio) on-cluster; kmcp wraps it with a sidecar HTTP
# gateway and exposes it as Service `github-issues:3000` serving MCP at `/mcp` (StreamableHTTP,
# appProtocol kgateway.dev/mcp) — verified by a throwaway probe 2026-06-26.
#
# TOOLSET-SCOPED to `issues` only (GITHUB_TOOLSETS). This is what keeps the two-tier split at the
# ROUTE level (no per-tool CEL): this MCP only ever contains issue tools, so reaching it == being
# allowed the issue capability. The agentgateway route in front (mcp-gateway/) requires the Keycloak
# capability `issue:create` (client `issue-tracker`) — see mcp-gateway/policies.yaml.
#
# GitHub auth = GITHUB_PERSONAL_ACCESS_TOKEN injected as env via kmcp's secretRefs->envFrom.
# Two secrets are envFrom'd into the pod:
#   - `github-creds`        — carries the GitHub-App camelCase keys (githubAppID, githubAppPrivateKey,
#                             etc.) used by Argo Events/Workflows. github-mcp-server ignores these
#                             unrecognised keys.
#   - `github-issues-token` — carries exactly GITHUB_PERSONAL_ACCESS_TOKEN, a short-lived App
#                             installation token minted by the ESO GithubAccessToken generator
#                             (generator-github-app-token.yaml + external-secret-github-issues-token.yaml).
#                             Refreshed every 30m, well within the ~1h GitHub expiry.
# PER §2.2 the *user JWT stops at the gateway*; GitHub-side identity is this bot/App token,
# and human attribution lives in the Workflow archive + agentgateway trace.
# PREREQ: both `github-creds` and `github-issues-token` must exist in ns kagent; ESO materializes
# both automatically (no manual secret creation needed). Pod stays NotReady until both exist.
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: github-issues
  namespace: kagent
spec:
  transportType: stdio
  stdioTransport: {}
  deployment:
    image: ghcr.io/github/github-mcp-server
    cmd: ./github-mcp-server
    args: ["stdio"]
    port: 3000
    env:
      GITHUB_TOOLSETS: "issues"
    secretRefs:
      - name: github-creds           # -> envFrom; GitHub-App camelCase keys (ignored by github-mcp-server)
      - name: github-issues-token    # -> envFrom; GITHUB_PERSONAL_ACCESS_TOKEN (ESO-minted App installation token)
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
