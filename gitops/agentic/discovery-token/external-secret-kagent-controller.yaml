# ExternalSecret: kagent-controller-client-secret in ns kagent
#
# Surfaces the kagent-controller Keycloak confidential-client secret from SM `keycloak-internal`
# (property `kagent-controller-client-secret`, auto-generated by the `secrets-manager` OpenTofu
# module via `random_password.keycloak_kagent_controller_client_secret`) into the k8s Secret
# `kagent-controller-client-secret` in ns `kagent`.
#
# The CronJob (cronjob.yaml) reads this Secret to perform a client_credentials grant against
# Keycloak and write the resulting JWT into `mcp-discovery-token`.
#
# SM key confirmed in:
#   cli/gitops/broker-keycloak-config.nu  (es-keycloak-realm, property kagent-controller-client-secret)
#   infrastructure/aws/secrets-manager/main.tf  (random_password.keycloak_kagent_controller_client_secret)
#
# ClusterSecretStore `git-creds-secretstore` is framework-constant (provisioned by kube-essentials
# helm app, helm/kube-essentials/external-secrets/git-creds/). It is cluster-scoped so no per-ns
# SecretStore is needed.
#
# Sync-wave: wave 0 (default within this Argo Application). The CronJob/Job that reads this Secret
# must wait for it to exist; since they're in the same Application, Argo applies resources in wave
# order and then checks health. Wave 0 here → wave 1 for the CronJob (see cronjob.yaml). ESO will
# RetryOnError if Keycloak's SM entry hasn't synced yet, so transient failures resolve automatically.
#
# NOTE: the kagent-controller realm CLIENT must exist in the `enterpriseclaw` Keycloak realm with
# `serviceAccountsEnabled: true`, the two audience mappers (issue-tracker + infra-provisioner), and
# both client-roles (issue:create, db:provision:dev) on its service account. That is a Session-Broker
# repo concern (see cross-repo dependency note in cronjob.yaml). If the realm client is absent,
# the CronJob will see `invalid_client` from Keycloak's token endpoint.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kagent-controller-client-secret
  namespace: kagent
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: git-creds-secretstore
    kind: ClusterSecretStore
  target:
    name: kagent-controller-client-secret
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: client-secret
      remoteRef:
        key: keycloak-internal
        property: kagent-controller-client-secret
