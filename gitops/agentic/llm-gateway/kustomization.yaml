# The agentgateway-as-LLM-gateway tier: the proxy Gateway, the Bedrock AI backend, and the route.
#
# What is NOT here (tenant-specific, owned by the CLI / private repo):
#   - `AgentgatewayParameters` (`agentic-gw-params`, ns `kagent`): generated by the CLI from the
#     live `bedrock_irsa_arn` tofu output. Contains the Bedrock IRSA role ARN annotation and
#     `automountServiceAccountToken: true` for the controller-managed proxy SA. The Gateway
#     (gateway.yaml) references it by the fixed name `agentic-gw-params`. The CLI must apply
#     this object BEFORE the proxy pod starts — without it the EKS IRSA webhook does not inject
#     the web-identity token volume and SigV4 signing silently fails.
#   - Any AWS static-credential Secret: removed; the production path is IRSA only.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kagent
resources:
  - gateway.yaml
  - backend.yaml
  - httproute.yaml
