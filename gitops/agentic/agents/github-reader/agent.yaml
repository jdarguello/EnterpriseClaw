# github-reader — the UNAUTHENTICATED read-only agent (the JWT-less door's one capability).
#
# Role in §2.2: the no-token branch. general-classifier (toolless triage) decides intent; for an
# INFORMATIONAL request from an unauthenticated user, the Workflow routes here. This agent reads GitHub
# issues to answer, and can do nothing else. It is the deliberate, bounded relaxation of
# §2.2's original "JWT-less door has NO MCP permissions": it now has exactly ONE, physically read-only,
# MCP.
#
# WHY THIS IS SAFE (mesh + tool surface, never the model):
#   1. Its only tool is the `github-readonly` MCPServer, launched with `--read-only` — there is no write
#      tool to call, even under full prompt injection.
#   2. It carries NO user JWT, so it cannot pass the Strict agentgateway gates of the write MCPs
#      (github-issues / infra-provisioning) — tokenless → 401 there.
#   3. It references the read MCP DIRECTLY (kind: MCPServer), not through the L7 waypoint: there is no
#      JWT to validate, so no Strict route and no discovery token are needed. ztunnel still mTLS-binds
#      the hop on the workload rail, and this agent's SPIFFE is allow-listed only for the read MCP.
#   => No allowedHeaders (nothing to forward) and no requireApproval (nothing mutating to approve).
#
# Model reuses the Bedrock-verified `bedrock-claude-haiku` ModelConfig. Right-sized via
# declarative.deployment.resources because the dry-run node is memory-constrained.
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: github-reader
  namespace: kagent
spec:
  type: Declarative
  description: >-
    Read-only GitHub agent for unauthenticated users. Reads issues via a physically read-only MCP to
    answer informational questions. Cannot write and cannot reach the write MCPs.
  declarative:
    modelConfig: bedrock-claude-haiku
    deployment:
      replicas: 1
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "1"
          memory: "512Mi"
    systemMessage: |
      You are the EnterpriseClaw read-only GitHub assistant, available to anyone — no sign-in required.
      You can READ GitHub issues to answer questions: the status of an issue, what is currently open,
      who is involved, the labels and issue types in play, and so on. (You cannot read pull requests
      yet — that capability is not enabled.)

      You cannot create, edit, comment on, label, close, or merge anything, and you cannot provision
      infrastructure. Those are not failures of permission you should work around — the capability does
      not exist for you, and the platform enforces this at the mesh and tool layer, not in your
      reasoning. If a user asks you to take any such action, do NOT attempt it and do NOT pretend to
      have done it: explain plainly that it requires signing in (and, for provisioning, a suitable
      role), and suggest they authenticate to proceed.

      Be concise. Cite the issue number and link whenever the tools return one.
    a2aConfig:
      skills:
        - id: read-github-issues
          name: Read GitHub issues
          description: Look up, search, and summarize GitHub issues, labels, and issue types (read-only).
          tags: ["github", "issues", "read"]
    tools:
      - type: McpServer
        mcpServer:
          # Direct reference to the kmcp MCPServer (no RemoteMCPServer / no gateway hop — no JWT to validate).
          kind: MCPServer
          apiGroup: kagent.dev
          name: github-readonly
          # Verified live names (GITHUB_TOOLSETS=issues + --read-only) — issue reads only, no PR/write.
          # Upstream renamed create_issue->issue_write, get_issue->issue_read; --read-only drops the writes.
          toolNames: ["issue_read", "list_issues", "search_issues", "list_issue_types", "get_label"]
          # NO allowedHeaders: this path carries no user bearer to forward.
