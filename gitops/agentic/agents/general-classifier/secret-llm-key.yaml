# Dummy API key for the bedrock-claude-haiku ModelConfig. The kagent OpenAI client only needs a
# non-empty key to initialize; agentgateway (NOT kagent) holds the real Bedrock credential and
# signs SigV4. This is NOT a real credential — safe to commit.
apiVersion: v1
kind: Secret
metadata:
  name: agentic-llm-gateway-key
  namespace: kagent
type: Opaque
stringData:
  OPENAI_API_KEY: "not-used-agentgateway-signs-bedrock-sigv4"
